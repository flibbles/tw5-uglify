name: Test plugin

on:
  push:
  pull_request:
    branches: [master]

jobs:
  test:
    steps:
      name: Checkout repository
      uses: actions/checkout@v4
      name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*
      name: Install dependencies
      run: npm ci
      name: Run tests
      run: npm test
